interface:
  display_name: "Arch Step"
  short_description: "Run the standalone full-arch workflow against one canonical plan artifact and converge onto canonical repo paths"
  default_prompt: "Use $arch-step for the full arch workflow or one literal full-arch command like `new`, `reformat`, `research`, `deep-dive`, `external-research`, `phase-plan`, `plan-enhance`, `fold-in`, `overbuild-protector`, `review-gate`, `implement`, `audit-implementation`, `status`, or `advance`. Internal refactors may widen enough to converge onto canonical repo paths, remove duplicate truth, and prevent drift, but the workflow must not invent new product functionality, modes, or speculative infrastructure while doing it."

policy:
  allow_implicit_invocation: true
