interface:
  display_name: "Wait"
  short_description: "One-shot delay-then-resume controller"
  default_prompt: "Use $wait when the user wants Codex or Claude Code to sleep for a specific parsed duration (for example `30m`, `1h30m`, `90s`, or `2d`) and then continue the same visible thread with a literal resume prompt exactly once. This is hook-backed: parse the duration with the documented grammar, verify every required runtime preflight leg, arm the host-aware `wait` controller state, and after the controller is armed just end the turn and let the installed Stop hook sleep and fire. No polling, no re-checking, no fresh child run during the wait. The installed runner is the shared suite hook at `~/.agents/skills/arch-step/scripts/arch_controller_stop_hook.py`; the repo-managed `Stop` entry must point at that runner with `--runtime codex` in Codex or `--runtime claude` in Claude Code. Do not invent or require a dedicated wait-specific controller file such as `wait_controller.py`. In Codex, preflight also includes `codex_hooks`. `wait` deliberately does NOT require the Claude hook-suppressed child-run preflight that `delay-poll` requires, because `wait` never launches a child run or re-evaluates a condition. Do not invent natural-language duration parsers, recurring schedules, or background-daemon behavior. For condition re-checking, route to `$delay-poll`; for recurring or scheduled work, route to `/loop` or `schedule`."

policy:
  allow_implicit_invocation: true
