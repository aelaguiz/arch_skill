interface:
  display_name: "Wait"
  short_description: "One-shot delay-then-resume controller"
  default_prompt: "Use $wait when the user wants Codex or Claude Code to sleep for a specific parsed duration (for example `30m`, `1h30m`, `90s`, or `2d`) and then continue the same visible thread with a literal resume prompt exactly once. This is hook-backed: parse the duration with the documented grammar, run `arch_controller_stop_hook.py --ensure-installed --runtime <codex|claude>` first (the installer is idempotent and flock-guarded, and writes the canonical `Stop` entry plus the `SessionStart` entry on Claude), arm the host-aware `wait` controller state, and after the controller is armed just end the turn and let the installed Stop hook sleep and fire. If `--ensure-installed` fails loud, repair the named prerequisite and rerun. No polling, no re-checking, no fresh child run during the wait. The installed runner is the shared suite hook at `~/.agents/skills/arch-step/scripts/arch_controller_stop_hook.py`. Do not invent or require a dedicated wait-specific controller file such as `wait_controller.py`. `wait` never launches a child run, so it does not need the Claude hook-suppressed child-run health check that `delay-poll` performs. Do not invent natural-language duration parsers, recurring schedules, or background-daemon behavior. For condition re-checking, route to `$delay-poll`; for recurring or scheduled work, route to `/loop` or `schedule`."

policy:
  allow_implicit_invocation: true
