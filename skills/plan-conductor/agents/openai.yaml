interface:
  display_name: "Plan Conductor"
  short_description: "Whole-plan conductor with Terra delivery shortcut"
  default_prompt: "Use $plan-conductor to drive an existing plan to verified completion. Before dispatch, recover the human-authorized outcome, smallest sufficient solution, frozen initial convergence closure, freeze anchor, enough proof, do-not-build boundary, and later human approvals; do not dispatch an overbroad, provenance-free, or unfrozen plan. Anchor these facts in the conductor log without copying the contract. Every worker prompt names directly authorized items, frozen-convergence items, and out-of-scope surfaces. Audit factual validity separately from scope authority: only authorized and frozen-convergence findings become send-backs; new scope needs a human, and unauthorized built scope is subtracted. Review repetition never creates authority. Detect scope cycling in every wave and the final sweep. Delegate phase-sized slices through $agent-delegate fresh-resumable sessions, parallelize only naturally independent frozen work, wait without tailing streams, delegate proof, and close with a scope-aware whole-plan audit and optional cold verifier. Codex workers accept gpt-5.6-sol, gpt-5.6-luna, and gpt-5.6-terra; omitted Codex model defaults to gpt-5.6-sol."

policy:
  allow_implicit_invocation: true
