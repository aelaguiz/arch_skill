interface:
  display_name: "Comment Loop"
  short_description: "Run an exhaustive map-first repo comment hardening loop with a root comment ledger; supports Codex-only auto continuation"
  default_prompt: "Use $comment-loop for a repo-wide comment-hardening pass that first exhaustively maps shipped code surfaces, the current proof surface, and the current explanatory surface before any edits. Do not add comments until the map is complete. Rank comment fronts by consequence of misunderstanding first, sharedness and blast radius second, explanation weakness or misleadingness third, and confusion or staleness signals fourth. In runtimes that support delegation, use parallel read-only agents during the mapping phase; otherwise build the same map sequentially. Choose the front from that map, add or repair only high-leverage code comments, docstrings, and doc comments that explain existing contracts, conventions, gotchas, and subtle behavior, and keep verification depth proportional to the front's downstream consequence and blast radius. Prefer comments at canonical owner boundaries over duplicated call-site narration. Do not use comments to change contracts, narrate obvious code, or excuse a bug that should be fixed instead. Unrelated dirty or untracked files do not block `run`, `review`, or `auto`; leave them alone unless they directly conflict with the current comment front or make verification unsafe. `review` is docs-only; `auto` is the Codex-only controller and must fail loud if the repo-managed `Stop` entry in `~/.codex/hooks.json`, the installed runner at `~/.agents/skills/arch-step/scripts/arch_controller_stop_hook.py`, or `codex_hooks` is missing. Do not preflight against a copied hook file under `~/.codex/hooks/`. Do not run the Stop hook yourself, and after `auto` is armed just end the turn and let Codex run the installed Stop hook."

policy:
  allow_implicit_invocation: true
