interface:
  display_name: "BrowserOS"
  short_description: "Safe preflight for direct BrowserOS MCP use"
  default_prompt: "Use $browseros before any direct BrowserOS MCP call. For page work, reuse one safe task-authorized normal non-hidden tab; if a new tab is necessary, request hidden=false and background=true, then verify its actual window, visibility, and active state. Keep routine page tools backgrounded, prove profile/account identity when relevant, and reconcile task-created state; use live discovery without tab work for BrowserOS-managed connector-only work."

dependencies:
  tools:
    - type: "mcp"
      value: "browseros"
      description: "BrowserOS browser automation and connector tools"

policy:
  allow_implicit_invocation: true
