interface:
  display_name: "Delay Poll"
  short_description: "Wait in Codex and re-check an external condition on a fixed interval"
  default_prompt: "Use $delay-poll when the user wants Codex to keep checking whether some external condition has become true every 30 minutes, every hour, or similar, then continue the same visible thread when it does. This is Codex-only and hook-backed: do one immediate grounded check first, arm `.codex/delay-poll-state.<SESSION_ID>.json` only if the condition is still false, and after the controller is armed just end the turn and let the installed Stop hook wait and re-check. Do not invent service-specific heuristics or treat this like a background daemon that survives after the session exits."

policy:
  allow_implicit_invocation: true
