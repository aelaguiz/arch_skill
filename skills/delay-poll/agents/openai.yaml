interface:
  display_name: "Delay Poll"
  short_description: "Wait and re-check an external condition on a fixed interval"
  default_prompt: "Use $delay-poll when the user wants Codex or Claude Code to keep checking whether some external condition has become true every 30 minutes, every hour, or similar, then continue the same visible thread when it does. This is hook-backed: do one immediate grounded check first, arm the host-aware `delay-poll` controller state only if the condition is still false, and after the controller is armed just end the turn and let the installed Stop hook wait and re-check. The installed runner is the shared suite hook at `~/.agents/skills/arch-step/scripts/arch_controller_stop_hook.py`; the repo-managed `Stop` entry must point at that runner with `--runtime codex` in Codex or `--runtime claude` in Claude Code. Do not invent or require a dedicated delay-specific controller file such as `delay_poll_controller.py`. In Codex, preflight also includes `codex_hooks`. In Claude Code, fresh checks also require hook-suppressed Claude child runs via `claude -p --settings '{\"disableAllHooks\":true}'` to work with normal host auth. Do not invent service-specific heuristics or treat this like a background daemon that survives after the session exits."

policy:
  allow_implicit_invocation: true
