interface:
  display_name: "Cynical Code Review"
  short_description: "Skeptical implementation-integrity code review"
  default_prompt: "Use $cynical-code-review to audit the requested implementation. Assume the completion story may be misleading and trace real code paths. For plan-, branch-, conductor-, PR-, or history-backed work, reconstruct the initial human scope, pre-freeze minimal convergence closure, later explicit human approvals, review waves, and final code. Hard-fail unauthorized post-freeze expansion or scope cycling as REQUIRED REPAIR with verdict not-approved, even when later plan text and tests include it; default to subtraction, not a broader system. A real newly discovered adjacent path still needs a human decision. Also hunt name-only completion, split-brain owners, side doors, partial unification, stopped-short workflows, overbuilt machinery, scope contamination, and fake proof. Save under /tmp/cynical-code-review/. Do not edit code, invoke external reviewers, manually spawn coding-harness executables, or build a runner/harness."

policy:
  allow_implicit_invocation: true
