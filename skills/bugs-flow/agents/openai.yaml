interface:
  display_name: "Bugs Flow"
  short_description: "Run the standalone analyze, fix, and review bug workflow against one bug doc"
  default_prompt: "Use $bugs-flow to investigate a bug from evidence and implement the smallest credible fix. Treat the human-authorized result as the corrected behavior. During analyze only, record the smallest directly competing same-contract closure or `none` and freeze it before fix mode. Fix and review cannot expand that closure; a later adjacent improvement needs a human decision, and unauthorized built scope is subtracted. Keep systemic fixes at the narrowest shared cause and verify against the bug doc."

policy:
  allow_implicit_invocation: true
