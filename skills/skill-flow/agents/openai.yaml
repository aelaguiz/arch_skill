interface:
  display_name: "Skill Flow"
  short_description: "Design and audit ordered flows of distinct skills, including DAG-grounded audits of large multi-skill suites"
  default_prompt: "Use $skill-flow to design, repair, or audit an ordered flow of multiple agent skills with distinct jobs, concrete handoffs, clear peer boundaries, and lean prompt contracts. For a large or scope-phrase multi-skill audit, apply the shared agent-orchestration policy: resolve scope first, use clean read-only native walkers with no nested fanout and parent-owned proportional concurrency, count semantically valid $skill-name references and exact backticked peer slugs while excluding code variables and unrelated code spans, build the labeled-edge substrate, then surface evidence-backed wasted-energy patterns."

policy:
  allow_implicit_invocation: true
