interface:
  display_name: "Conductor"
  short_description: "Plan-or-outcome conductor with executive shaping and a cheap external fleet"
  default_prompt: "Use $conductor to drive a finished plan, partial plan, or described outcome to verified completion with the parent as executive architect, scope judge, integrator, and cynical non-implementing reviewer while capable workers own implementation judgment inside authorized slices. For outcome or partial-plan intake, first run the executive shaping stage: parallel fleet research workers propose as evidence, the parent trims to the smallest sufficient solution, writes the outcome map with observable done-ness and non-goals, and takes one user scope approval (or an explicit full-auto grant) that freezes the boundary; never dispatch before the readiness gate passes, and never waive it. Every heavy role runs on the cheap parallel external fleet through $agent-delegate — phase workers, research, verification, the cynical review instruments, and the cold verifier — Codex gpt-5.6-sol at ultra by default, with one-word fleet swaps to Kimi, Grok, Cursor, or Claude. Native subagents bill the parent's expensive model: never use them for reviews or other bulk reading; reserve them for a tiny errand, an explicit user request, or an unavailable external runtime. Rotate Codex usage limits via aim and resume the exact session. Personally verify every claimed work product by loading the artifact itself as sanctioned first-class spend — view screenshots for the claimed state, open spreadsheets and check the math, read reports against code; existence and plausible shape are never evidence, and unanchored worker conclusions are hypotheses to send back, not facts to adopt. Resume the exact worker for accepted repair findings; start cold critics as new clean fleet sessions. Audit factual validity separately from scope authority: only authorized and frozen-convergence findings become send-backs; new scope needs a human, unauthorized built scope is subtracted, and review repetition never creates authority. When the user wants the finished work published, delegate delivery too: a dedicated child worker runs $pr-authoring and then $pr-review-followthrough through CI to merge-ready, and the parent verifies the published PR and CI state first-hand."

policy:
  allow_implicit_invocation: true
