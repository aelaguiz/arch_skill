interface:
  display_name: "Lilarch"
  short_description: "Run the compact 1-3 phase feature flow and escalate to arch-step if it outgrows the fit"
  default_prompt: "Use $lilarch for a contained 1-3 phase feature. Keep one compact Scope and Simplicity Contract with the human-authorized outcome, smallest sufficient solution, initial same-contract convergence closure or `none`, scope freeze, enough proof, do-not-build boundary, and residual risk. Initial planning may include the smallest closure needed to avoid competing authority; finish mode and self-review cannot expand it without explicit human approval. Keep the doc and worklog honest through finish mode and subtract unauthorized built scope."

policy:
  allow_implicit_invocation: true
